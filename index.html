<!doctype html>
<html lang="en" data-bs-theme="light">

<head>
    <title>To Do</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Rubik:wght@500;700&display=swap"
        rel="stylesheet" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous" />

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<main class="page-shell container-fluid px-4 py-5">

    <div class="row justify-content-center">
        <div class="col-12 col-xl-10">

            <!-- TITLE -->
            <section class="top-panel position-relative overflow-hidden">

                <div class="hero-copy mb-4">
                    <h1 class="app-title">To Do List</h1>
                </div>

                <!-- INPUT ROW -->
                <div class="row g-3 align-items-end align-items-md-center mb-4 form-row">

                    <div class="col-12 col-md-6">
                        <input type="text" id="taskInput"
                            class="form-control task-input"
                            placeholder="Enter your task here" />
                    </div>

                    <div class="col-12 col-md-3">

                        <div class="priority-select-wrapper">
                            <span class="priority-arrow">▾</span>

                            <select id="priority"
                                class="form-select priority-select"
                                aria-label="Priority">

                                <option value="" selected>Choose priority</option>
                                <option value="High">High</option>
                                <option value="Medium">Medium</option>
                                <option value="Low">Low</option>

                            </select>
                        </div>

                    </div>

                    <div class="col-12 col-md-3 d-grid">
                        <button id="addTaskBtn" class="btn btn-bubbly btn-add">
                            Add task
                        </button>
                    </div>

                </div>

                <p class="warning" id="warning"></p>

                <!-- ACCORDION -->
                <div class="accordion priority-accordion" id="priorityAccordion">

                    <!-- HIGH -->
                    <div class="accordion-item priority-panel high-panel mb-3 border-0 overflow-hidden">

                        <h2 class="accordion-header" id="headingHigh">
                            <button class="accordion-button collapsed" type="button"
                                data-bs-toggle="collapse"
                                data-bs-target="#collapseHigh">

                                <span class="panel-label"></span>
                                <span>High Priority</span>

                            </button>
                        </h2>

                        <div id="collapseHigh"
                            class="accordion-collapse collapse show">

                            <div class="accordion-body px-0 py-3"
                                 id="highSection">

                                <div class="empty-message">No tasks right now.</div>

                            </div>
                        </div>
                    </div>

                    <!-- MEDIUM -->
                    <div class="accordion-item priority-panel medium-panel mb-3 border-0 overflow-hidden">

                        <h2 class="accordion-header" id="headingMedium">
                            <button class="accordion-button collapsed" type="button"
                                data-bs-toggle="collapse"
                                data-bs-target="#collapseMedium">

                                <span class="panel-label"></span>
                                <span>Medium Priority</span>

                            </button>
                        </h2>

                        <div id="collapseMedium"
                            class="accordion-collapse collapse">

                            <div class="accordion-body px-0 py-3"
                                 id="mediumSection">

                                <div class="empty-message">No tasks right now.</div>

                            </div>
                        </div>
                    </div>

                    <!-- LOW -->
                    <div class="accordion-item priority-panel low-panel mb-3 border-0 overflow-hidden">

                        <h2 class="accordion-header" id="headingLow">
                            <button class="accordion-button collapsed" type="button"
                                data-bs-toggle="collapse"
                                data-bs-target="#collapseLow">

                                <span class="panel-label"></span>
                                <span>Low Priority</span>

                            </button>
                        </h2>

                        <div id="collapseLow"
                            class="accordion-collapse collapse">

                            <div class="accordion-body px-0 py-3"
                                 id="lowSection">

                                <div class="empty-message">No tasks right now.</div>

                            </div>
                        </div>
                    </div>

                </div>

                <!-- FOOTER CONTROLS -->
                <div class="d-flex flex-column flex-sm-row justify-content-between align-items-center gap-3 mt-4 button-row">

                    <div class="status-note">
                        Add new items, choose a priority, and keep your flow going.
                    </div>

                    <button id="clearTaskBtn" class="btn btn-bubbly btn-clear">
                        Clear Tasks
                    </button>

                </div>

            </section>
        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
